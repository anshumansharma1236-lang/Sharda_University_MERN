<!DOCTYPE html>
<html lang="en">
<head>
    <title>Table Element Example</title>
</head>
<body>

    <!-- Table: its collection of rows and columns
    Why table in html:
    If you want to present data in tabular format(rows and columns) we generally used table 

    table = html
    head = head
    body = body

    table attributes:

    border=""
    cellpadding:
    cellspacing

    
    -->

    <table border="1" cellpadding="10px" cellspacing="10px" >

        <caption>Student List</caption>

        <!-- Defines table columns name -->
        <thead bgcolor="red">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
            </tr>
        </thead>

        <!-- Defines tablel coulmn values row wise -->
        <tbody bgcolor="yellow"> 

            <!-- first row -->
            <tr>
                <td>Raeksh</td>
                <td>rakesh@gmail.com</td>
                <td>Noida</td>
            </tr>

            <tr>
                <td>Tarun</td>
                <td>tarun@gmail.com</td>
                <td>Delhi</td>
            </tr>

            <tr>
                <td>Khushi</td>
                <td>khushi@gmail.com</td>
                <td>Agra</td>
            </tr>
            

        </tbody>

    </table>
    
</body>
</html>
