<!DOCTYPE html>
<html lang="en">
<head>
    <title>Select Element</title>
</head>
<body>

    <!-- It is generally used in webpage to create drop downs to select one option or multple options -->
    
    <label for="country">Select Your Country: </label>

    <!-- select element attribute:
    multiple: for multi selection
    diasabled: for disabling the selection
    
    option attribute:
    selected
    -->
    <select name="country" multiple required>
        <option value=""></option>
        <option value="india">India</option>
        <option value="china" selected>China</option>
        <option value="nepal">Nepal</option>
        <option value="pakistan">Pakistan</option>
        <option value="america">America</option>
    </select>
    
</body>
</html>
