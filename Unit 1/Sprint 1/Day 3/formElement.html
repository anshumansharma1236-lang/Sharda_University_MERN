<!DOCTYPE html>
<html lang="en">
<head>
    <title>Form Element Example</title>
</head>
<body>

    <!-- Form Element - to take data or inputs from user
    - it has collection or set of input elements it can be input, select, and text area element 
    -->

    <form>
        
        <label for="name">Enter Name:</label>
        <input type="text" placeholder="Enter Name" required>

        <br>

        <label for="gender">Select Gender:</label>

        <label for="male">Male</label>
        <input type="radio" name="gender">

        <label for="female">Female</label>
        <input type="radio" name="gender">

        <br>

        <label for="email">Enter Email:</label>
        <input type="email" placeholder="Enter Email" required readonly value="alsjdflasjdfl">

        <br>

        <label for="password">Enter Password:</label>
        <input type="password" required placeholder="Enter Password">

        <br>

        <input type="submit" value="Register">


    </form>
