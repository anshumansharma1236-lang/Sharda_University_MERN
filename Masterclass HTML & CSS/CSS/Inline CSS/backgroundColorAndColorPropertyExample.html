<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background color and color property Example</title>
</head>
<body>

    <!-- Inline CSS - Line by line provide css for each html element 
     
    To give inline style to particular html elment we have one common attribute in each html elemeent:
    style attribute
    -->

    <p style="background-color: red;color: white;">I'm paragraph</p>

    <!-- different ways of giving colors:
    1. using color name - red, black, blue, aqua? - limiatation problem
    
    2. using hex code - #000000 - it is used in industry a lot because using this hex code we can create millions of color combinations

    3. decimal code - rgb(red, green, blue) - 0-255
    
    -->

    <hr>

    <!-- color name -->
    <p 
    style="
    background-color: red;
    color: white;
    ">
    Paragraph</p>

    <hr>
    <!-- hex code -->
    <p 
    style="
    background-color: #c42f2f;
    ">
    Paragraph</p>

    <hr>

    <!-- decimal code -->
    <p 
    style="
    background-color: rgb(255, 0, 0);
    ">
    Paragraph</p>

    
</body>
</html>
