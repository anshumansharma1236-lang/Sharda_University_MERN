<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Property Example</title>
</head>
<body
style="margin: 0;"
>

    <!-- box model properties:
    1. padding
    2. margin
    3. border 

    margin: space outside the border
    margin-left:20px
    margin-right:20px
    margin-top:20px
    margin-bottom:20px

    shortcut:
    margin: top-bottom left-right
    margin: 0px 20px

    shortcut:
    margin: clock-wise

    margin: top right bottom left

    margin: 10px 5px 40px 30px

    super shortcut:
    margin: 10px - 10px margin apply allside


    padding: space between content and border

    padding-left:20px
    padding-right:20px
    padding-top:20px
    padding-bottom:20px

    shortcut:
    padding: top-bottom left-right
    padding: 0px 20px

    shortcut:
    padding: clock-wise

    padding: top right bottom left

    padding: 10px 5px 40px 30px

    super shortcut:
    padding: 10px - 10px padding apply allside
    -->

    <div style="
        width: 200px;
        height: 200px;
        border: 2px solid red;
        padding: 20px;
        box-sizing: border-box;
        ">
    <span>I'm span</span>
    </div>

    <!-- Note: bydefault box size increases on increasing border and padding 
    
    If you want to stop this:
    box-sizzing:border-box
    -->
    
</body>
</html>
