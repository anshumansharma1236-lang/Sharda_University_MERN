    <title>Inline And Block Element</title>

<body>

    <!-- Inline and Block Element Example:
     
    1. Inline Element-  They block line till their presence 
    Example: input, a, label, span, button other elements
    2. Block Element- They block entire line
    Example: heading(h1 - h6), p, div, ul, ol, div
    -->

    <!-- Exmaple -->

    <!-- <p style="background-color: red;">Paragraph</p>

    <button style="background-color: red;">Hello</button>
    <input type="text">
    <span>Hello</span>
    <input type="checkbox"> -->


    <!-- How to make inline element block and block element inline
     
    display:inline, block, inline-block
    -->

    <!-- <h1 style="background-color: red;display: inline;">I'm heading one</h1>
    <input type="text">

    <hr>
    <span style="background-color: red;display: block;">I'm span</span> -->

    <!-- Inline-block -->

    <div 
    style="
    height: 100px;
    width: 100px;
    background-color: red;
    display: inline-block;
    "
    >
    </div>

    <div 
    style="
    height: 100px;

    "

    </div>

    <div

    "
