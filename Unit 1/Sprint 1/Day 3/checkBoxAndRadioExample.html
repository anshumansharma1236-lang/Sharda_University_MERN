<!DOCTYPE html>
<html lang="en">
<head>
    <title>Checkbox and Radio Element</title>
</head>
<body>

    <!-- Diff between checkbox and radio -->

        
    <label for="gender">Select Gender:</label>

    <label for="male">Male</label>
    <input type="radio" name="gender">

    <label for="female">Female</label>
    <input type="radio" name="gender">

    <hr>
    <!-- checkbox - allow us to select multiple options -->

    <label for="skill">Select Skills:</label>

    <label for="Java">java</label>
    <input type="checkbox" name="java-skill">

    <label for="javscript">Javascript</label>
    <input type="checkbox" name="javascript-skill">

    <label for="python">Python</label>
    <input type="checkbox" name="python-skill">


    
</body>
</html>
