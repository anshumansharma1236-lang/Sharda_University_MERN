<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlien and Block Element</title>
</head>
<body>

    <!-- 
    Inline Element - It blocks till their presence
    Example, span, input, img, b, strong

    Block Element - it blocks entire line 
    Example - Headings, paragraph, div, list 
    -->

    <h1 style="background-color: red;">I'm heading one</h1>
    <p style="background: teal;">Paragraph</p>

    <hr>
    <input type="text" placeholder="Enter Name">
    <span style="background-color: teal;">Hello</span>
    <button>Submit</button>
    <p>Paragraph</p>


    <!-- How to make inline to block and block to inline
    for this we have display property: 
    -->

    <hr>
    <p style="background-color: red;display: inline;">I'm paragraph</p>
    <input type="text">

    <hr>
    <span style="background-color: red;display: block;">I'm span</span>

    <!-- In terms of inline and block element we have following display values:
    1. inline
    2. block
    3. inline-block 
    -->

    <!-- To create box:
    height and width:
    element: div 
    -->

    <br>

    <div style="width: 200px;height:200px;background-color: red;display: inline-block;"></div>

    <div style="width: 200px;height:200px;background-color: teal;display: inline-block;"></div>

    <div style="width: 200px;height:200px;background-color: green;display: inline-block;"></div>

    <div style="width: 200px;height:200px;background-color: cyan;display: inline-block;"></div>





    
</body>
</html>
