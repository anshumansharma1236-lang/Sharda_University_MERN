<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to CSS</title>
</head>
<body>

    <!-- CSS: For styling particular html element or all at once
    Type of CSS:
    1. Inline CSS
    2. Internal CSS
    3. External CSS
    
    Note: In all above types of css we use css properties to style the html element.

    HTML - Set of markup elements/tags
    Example - Semantic, and Non Semantic
    CSS - Set of CSS Properties where particular is responsible for styling paritcular html element
    Example - Color, Text Alignment, Margin, Padding, Position and others.


    1. Inline CSS: Every html element is having one common attribute which is style attribute using this style attribute we can give style to particular html element line by line or element by element.\

    Syntax:
    <p style="propertyName:propertyValue;propertyName:propertyValue;">Paragraph</p>
    -->

    <!-- color Property:
    We use it to give color to html element by following ways:
    1. color name
    2. hexa code
    3. decimal code - rgb(red, green, blue) - 0 - 255 
    -->

    <!-- color name -->
    <p style="color: red;">Paragraph</p>

    <!-- hexa code 
    This is most recommended approcch for modern application. 
    -->
    <p style="color: #0000ff;">Paragraph</p>

     <!-- decimal code -->
    <p style="color: rgb(0, 255, 0);">Paragraph</p>

    <hr>

    <p style="color: white;background-color: red;">This is Paragraph</p>

    <span style="color: white;background-color: red;">This is span</span>

    <hr>

    <p style="color: #00CC6A;">Paragraph</p>
    <p style="color: #FFE51F;">Para</p>

    for color picker - colorZilla extension for google chrome

</body>
</html>
