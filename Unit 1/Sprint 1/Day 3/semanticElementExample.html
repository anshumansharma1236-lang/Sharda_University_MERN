<!DOCTYPE html>
<html lang="en">
<head>
    <title>Semnatic Element</title>
</head>
<body>

    <!-- In HTML, There are two type of elements:
    1. Sementaic - They just add the meaning to the hmtl document.
    Example header, nav, footer, main, section, aside
    2. Non Semantic - they structure the plain text and don't give any meaning to html document.
    Example: heading, paragraph, div, span, input etcs.
    -->

    <!-- Good Exmaple of Semantic Element -->
     <header>
        <nav>
            <center>
                <a href="#">Home</a>
                &nbsp; | &nbsp;
                <a href="#">About</a>
                &nbsp; | &nbsp;
                <a href="#">Course</a>
                &nbsp;
            </center>
        </nav>
        <hr>
     </header>

     <main>
        <section>Mobiles</section>
        <section>Tablets</section>
        <section>Computers</section>
     </main>
     <hr>
     <aside>
            <span>I'm Aside</span>
     </aside>
     <hr>
    
     <footer>
        &copy; All Rights Reserved.
     </footer>
</body>
</html>
